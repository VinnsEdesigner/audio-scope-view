<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete API Key - Audio Scope View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1a1a1d;
      --bg-secondary: #212124;
      --bg-elevated: #28282c;
      --bg-hover: #2e2e33;
      
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1a6;
      --text-tertiary: #6e6e73;
      
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-default: rgba(255, 255, 255, 0.1);
      
      --accent: #fb7185;
      --accent-hover: #f43f5e;
      
      --destructive: #ef4444;
      --destructive-hover: #dc2626;
      
      --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'Geist Mono', monospace;
      
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Modal */
    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 400px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.3s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Modal header */
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .modal-close:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .modal-close svg {
      width: 18px;
      height: 18px;
    }

    /* Modal body */
    .modal-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }

    /* Warning icon */
    .warning-icon {
      width: 48px;
      height: 48px;
      background: rgba(239, 68, 68, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .warning-icon svg {
      width: 24px;
      height: 24px;
      color: var(--destructive);
    }

    /* Warning text */
    .warning-text {
      text-align: center;
      margin-bottom: 20px;
    }

    .warning-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .warning-description {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* API Key info */
    .api-key-info {
      background: var(--bg-primary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .api-key-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .api-key-preview {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }

    /* Checkbox confirmation */
    .confirm-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 12px;
      background: rgba(239, 68, 68, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-md);
      transition: all 0.15s ease;
    }

    .confirm-checkbox:hover {
      background: rgba(239, 68, 68, 0.08);
    }

    .confirm-checkbox.checked {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.4);
    }

    .checkbox-box {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border-default);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .confirm-checkbox.checked .checkbox-box {
      background: var(--destructive);
      border-color: var(--destructive);
    }

    .checkbox-box svg {
      width: 12px;
      height: 12px;
      color: white;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .confirm-checkbox.checked .checkbox-box svg {
      opacity: 1;
    }

    .confirm-text {
      font-size: 13px;
      color: var(--text-primary);
    }

    /* Modal footer */
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 16px 24px;
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
      font-family: inherit;
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .btn-primary {
      background: var(--destructive);
      color: white;
    }

    .btn-primary:hover {
      background: var(--destructive-hover);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
    }
  </style>
</head>
<body>
  <!-- Modal Overlay -->
  <div class="modal-overlay">
    <div class="modal">
      <!-- Modal Header -->
      <div class="modal-header">
        <h2 class="modal-title">Delete API Key</h2>
        <button class="modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Modal Body -->
      <div class="modal-body">
        <!-- Warning icon -->
        <div class="warning-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>

        <!-- Warning text -->
        <div class="warning-text">
          <div class="warning-title">Are you sure you want to delete this API key?</div>
          <div class="warning-description">This action cannot be undone. Any applications using this key will immediately lose access.</div>
        </div>

        <!-- API Key info -->
        <div class="api-key-info">
          <div class="api-key-name">Production API Key</div>
          <div class="api-key-preview">vyz_live_••••••••••••••••3f8a</div>
        </div>

        <!-- Confirmation checkbox -->
        <div class="confirm-checkbox" id="confirmCheckbox">
          <div class="checkbox-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <path d="M20 6L9 17l-5-5"/>
            </svg>
          </div>
          <span class="confirm-text">Yes, delete this API key permanently</span>
        </div>
      </div>

      <!-- Modal Footer -->
      <div class="modal-footer">
        <button class="btn btn-secondary">Cancel</button>
        <button class="btn btn-primary" id="deleteBtn" disabled>Delete API Key</button>
      </div>
    </div>
  </div>

  <script>
    // Close modal
    document.querySelector('.modal-close').addEventListener('click', () => {
      document.querySelector('.modal-overlay').style.display = 'none';
    });

    document.querySelector('.btn-secondary').addEventListener('click', () => {
      document.querySelector('.modal-overlay').style.display = 'none';
    });

    // Confirmation checkbox
    const confirmCheckbox = document.getElementById('confirmCheckbox');
    const deleteBtn = document.getElementById('deleteBtn');

    confirmCheckbox.addEventListener('click', () => {
      confirmCheckbox.classList.toggle('checked');
      deleteBtn.disabled = !confirmCheckbox.classList.contains('checked');
    });

    // Delete button
    deleteBtn.addEventListener('click', () => {
      if (confirmCheckbox.classList.contains('checked')) {
        document.querySelector('.modal-overlay').style.display = 'none';
      }
    });

    // Close on overlay click
    document.querySelector('.modal-overlay').addEventListener('click', (e) => {
      if (e.target === document.querySelector('.modal-overlay')) {
        document.querySelector('.modal-overlay').style.display = 'none';
      }
    });

    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.querySelector('.modal-overlay').style.display = 'none';
      }
    });
  </script>
</body>
</html>
