<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oscilloscope Preview - Audio Scope View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0b;
      --bg-secondary: #141416;
      --bg-elevated: #1c1c1f;
      --bg-hover: #242428;
      --bg-active: #2c2c31;
      
      --text-primary: #fafafa;
      --text-secondary: #a1a1a6;
      --text-tertiary: #6e6e73;
      
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-default: rgba(255, 255, 255, 0.1);
      --border-hover: rgba(255, 255, 255, 0.15);
      
      --accent: oklch(0.82 0.14 190);
      --accent-hover: oklch(0.88 0.16 190);
      
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .scope-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 60px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      padding: 12px 0;
      gap: 4px;
    }

    .sidebar-btn {
      width: 44px;
      height: 44px;
      margin: 0 auto;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      background: transparent;
      border: none;
      color: var(--text-tertiary);
    }

    .sidebar-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .sidebar-btn.active {
      background: var(--accent);
      color: black;
    }

    .sidebar-btn svg { width: 22px; height: 22px; }

    .sidebar-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 8px 12px;
    }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      height: 56px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .menu-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      transition: all 0.15s ease;
    }

    .menu-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .menu-btn svg { width: 20px; height: 20px; }

    .scope-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .scope-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-tertiary);
    }

    .status-dot.live {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      transition: all 0.15s ease;
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .icon-btn svg { width: 18px; height: 18px; }

    /* Canvas area */
    .canvas-area {
      flex: 1;
      padding: 20px;
      display: flex;
      gap: 16px;
      overflow: hidden;
    }

    .canvas-wrapper {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .canvas-header {
      height: 40px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--bg-elevated);
    }

    .canvas-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .canvas-time {
      font-size: 11px;
      font-family: 'Geist Mono', monospace;
      color: var(--text-tertiary);
    }

    .canvas-container {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    #oscilloscope-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Grid overlay */
    .grid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 10% 10%;
    }

    .center-line {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    /* Control panel */
    .control-panel {
      width: 280px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      height: 48px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--bg-elevated);
    }

    .panel-tabs {
      display: flex;
      gap: 2px;
      padding: 8px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-subtle);
    }

    .panel-tab {
      flex: 1;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s ease;
      background: transparent;
      border: none;
      color: var(--text-tertiary);
    }

    .panel-tab:hover {
      color: var(--text-secondary);
      background: var(--bg-hover);
    }

    .panel-tab.active {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .control-section {
      margin-bottom: 20px;
    }

    .control-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .control-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .control-value {
      font-size: 12px;
      font-family: 'Geist Mono', monospace;
      color: var(--text-tertiary);
      background: var(--bg-primary);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
    }

    .slider-container {
      margin-bottom: 16px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .slider-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .slider-value {
      font-size: 12px;
      font-family: 'Geist Mono', monospace;
      color: var(--accent);
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--bg-primary);
      appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
      font-family: inherit;
    }

    .btn svg { width: 16px; height: 16px; }

    .btn-primary {
      background: var(--accent);
      color: black;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
      border-color: var(--border-hover);
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .btn-group .btn {
      flex: 1;
    }

    /* Measurements grid */
    .measurements-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .measurement-card {
      background: var(--bg-primary);
      border-radius: var(--radius-md);
      padding: 12px;
      text-align: center;
    }

    .measurement-value {
      font-size: 18px;
      font-weight: 600;
      font-family: 'Geist Mono', monospace;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .measurement-label {
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    /* Color picker */
    .color-picker {
      display: flex;
      gap: 8px;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s ease;
    }

    .color-swatch:hover {
      transform: scale(1.1);
    }

    .color-swatch.active {
      border-color: white;
      box-shadow: 0 0 0 2px var(--bg-primary), 0 0 0 4px currentColor;
    }

    /* Bottom bar */
    .bottom-bar {
      height: 48px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .bottom-info {
      display: flex;
      gap: 24px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .info-item span:last-child {
      font-family: 'Geist Mono', monospace;
      color: var(--text-secondary);
    }

    .view-toggle {
      display: flex;
      background: var(--bg-primary);
      border-radius: var(--radius-md);
      padding: 2px;
    }

    .view-toggle-btn {
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      border: none;
      color: var(--text-tertiary);
      transition: all 0.15s ease;
    }

    .view-toggle-btn.active {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Icons as SVG components
    const Icons = {
      Menu: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>,
      Play: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
      Square: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>,
      Radio: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 010 8.49m-8.48-.01a6 6 0 010-8.49m11.31-2.82a10 10 0 010 14.14m-14.14 0a10 10 0 010-14.14"/></svg>,
      Snowflake: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2v20m0-20 4 4m-4-4L2 12m10 10 4 4m-4-4 4-4M12 12l4 4m-4-4-4 4"/></svg>,
      SlidersHorizontal: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 6H3m18 6H3m18 6H3"/></svg>,
      Crosshair: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M22 12h-4m-12 0H2m10 12v-4m0-12 4 4m-4-4-4 4"/></svg>,
      Activity: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
      Ruler: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21.21 15.89A10 10 0 118 2.83M22 12A10 10 0 0012 2v10z"/></svg>,
      Camera: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>,
      Info: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4m0-4h.01"/></svg>,
      Palette: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 011.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.555C21.965 6.012 17.461 2 12 2z"/></svg>,
      ChevronDown: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>,
      ZoomIn: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35M11 8v6m-3-3h6"/></svg>,
      Download: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4m4-5 5 5 5-5m-5 5V3"/></svg>,
    };

    // Color options
    const TRACE_COLORS = [
      { id: 'teal', color: 'oklch(0.82 0.14 190)', name: 'Teal' },
      { id: 'red', color: 'oklch(0.62 0.24 25)', name: 'Red' },
      { id: 'blue', color: 'oklch(0.55 0.24 265)', name: 'Blue' },
    ];

    function OscilloscopePreview() {
      const canvasRef = useRef(null);
      const [running, setRunning] = useState(false);
      const [traceColor, setTraceColor] = useState('teal');
      const [timeDiv, setTimeDiv] = useState(1);
      const [voltDiv, setVoltDiv] = useState(1);
      const [triggerLevel, setTriggerLevel] = useState(0);
      const [gridOn, setGridOn] = useState(true);
      const [glowOn, setGlowOn] = useState(false);
      const [viewMode, setViewMode] = useState('time');
      const [activePanel, setActivePanel] = useState('display');
      
      // Measurements
      const [measurements, setMeasurements] = useState({
        vpp: '1.42',
        rms: '0.51',
        freq: '1.02',
        dc: '0.08',
      });

      // Draw mock waveform
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        const width = canvas.width = canvas.offsetWidth * 2;
        const height = canvas.height = canvas.offsetHeight * 2;
        
        // Clear
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, width, height);
        
        // Draw grid
        if (gridOn) {
          ctx.strokeStyle = 'rgba(255,255,255,0.05)';
          ctx.lineWidth = 1;
          
          // Vertical lines
          for (let i = 0; i <= 10; i++) {
            ctx.beginPath();
            ctx.moveTo(width * i / 10, 0);
            ctx.lineTo(width * i / 10, height);
            ctx.stroke();
          }
          
          // Horizontal lines
          for (let i = 0; i <= 8; i++) {
            ctx.beginPath();
            ctx.moveTo(0, height * i / 8);
            ctx.lineTo(width, height * i / 8);
            ctx.stroke();
          }
          
          // Center lines (brighter)
          ctx.strokeStyle = 'rgba(255,255,255,0.1)';
          ctx.beginPath();
          ctx.moveTo(width / 2, 0);
          ctx.lineTo(width / 2, height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, height / 2);
          ctx.lineTo(width, height / 2);
          ctx.stroke();
        }
        
        // Draw waveform
        const selectedColor = TRACE_COLORS.find(c => c.id === traceColor);
        
        if (glowOn) {
          ctx.shadowColor = selectedColor.color;
          ctx.shadowBlur = 20;
        } else {
          ctx.shadowBlur = 0;
        }
        
        ctx.strokeStyle = selectedColor.color;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        ctx.beginPath();
        
        const centerY = height / 2;
        const amplitude = height * 0.3;
        
        for (let x = 0; x < width; x++) {
          const t = (x / width) * Math.PI * 8;
          const y = centerY + Math.sin(t) * amplitude * voltDiv + Math.sin(t * 2.5) * amplitude * 0.2;
          
          if (x === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        }
        
        ctx.stroke();
        
        // Draw trigger level line
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255, 200, 0, 0.5)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        const triggerY = centerY - (triggerLevel * amplitude * 2);
        ctx.moveTo(0, triggerY);
        ctx.lineTo(width, triggerY);
        ctx.stroke();
        ctx.setLineDash([]);
        
      }, [traceColor, gridOn, glowOn, timeDiv, voltDiv, triggerLevel]);

      return (
        <div className="scope-container">
          {/* Sidebar */}
          <div className="sidebar">
            <button className="sidebar-btn active">
              <Icons.Radio />
            </button>
            <button className="sidebar-btn">
              <Icons.Activity />
            </button>
            <button className="sidebar-btn">
              <Icons.Ruler />
            </button>
            <div className="sidebar-divider" />
            <button className="sidebar-btn">
              <Icons.Camera />
            </button>
            <button className="sidebar-btn">
              <Icons.Info />
            </button>
          </div>

          {/* Main area */}
          <div className="main">
            {/* Top bar */}
            <div className="topbar">
              <div className="topbar-left">
                <button className="menu-btn">
                  <Icons.Menu />
                </button>
                <span className="scope-title">Scope 1</span>
                <div className="scope-status">
                  <span className={`status-dot ${running ? 'live' : ''}`} />
                  <span>{running ? 'Live' : 'Stopped'}</span>
                </div>
              </div>
              <div className="topbar-right">
                <button className="icon-btn">
                  <Icons.ZoomIn />
                </button>
                <button className="icon-btn">
                  <Icons.Download />
                </button>
              </div>
            </div>

            {/* Canvas area */}
            <div className="canvas-area">
              <div className="canvas-wrapper">
                <div className="canvas-header">
                  <span className="canvas-label">Waveform</span>
                  <span className="canvas-time">48.0 kHz</span>
                </div>
                <div className="canvas-container">
                  <canvas ref={canvasRef} id="oscilloscope-canvas" />
                  <div className="grid-overlay" />
                  <div className="center-line" />
                </div>
              </div>

              {/* Control panel */}
              <div className="control-panel">
                <div className="panel-tabs">
                  <button 
                    className={`panel-tab ${activePanel === 'display' ? 'active' : ''}`}
                    onClick={() => setActivePanel('display')}
                  >
                    Display
                  </button>
                  <button 
                    className={`panel-tab ${activePanel === 'trigger' ? 'active' : ''}`}
                    onClick={() => setActivePanel('trigger')}
                  >
                    Trigger
                  </button>
                  <button 
                    className={`panel-tab ${activePanel === 'measure' ? 'active' : ''}`}
                    onClick={() => setActivePanel('measure')}
                  >
                    Meas
                  </button>
                </div>

                <div className="panel-content">
                  {activePanel === 'display' && (
                    <>
                      <div className="btn-group">
                        <button 
                          className={`btn ${running ? 'btn-danger' : 'btn-primary'}`}
                          onClick={() => setRunning(!running)}
                        >
                          {running ? <Icons.Square /> : <Icons.Play />}
                          {running ? 'Stop' : 'Run'}
                        </button>
                        <button className="btn btn-secondary">
                          <Icons.Snowflake />
                          Freeze
                        </button>
                      </div>

                      <div className="control-section">
                        <div className="control-section-title">Time Base</div>
                        <div className="slider-container">
                          <div className="slider-header">
                            <span className="slider-label">Time/Div</span>
                            <span className="slider-value">{timeDiv} ms</span>
                          </div>
                          <input 
                            type="range" 
                            min="0.1" 
                            max="10" 
                            step="0.1"
                            value={timeDiv}
                            onChange={(e) => setTimeDiv(parseFloat(e.target.value))}
                          />
                        </div>
                      </div>

                      <div className="control-section">
                        <div className="control-section-title">Vertical</div>
                        <div className="slider-container">
                          <div className="slider-header">
                            <span className="slider-label">Volt/Div</span>
                            <span className="slider-value">{voltDiv.toFixed(1)} V</span>
                          </div>
                          <input 
                            type="range" 
                            min="0.1" 
                            max="5" 
                            step="0.1"
                            value={voltDiv}
                            onChange={(e) => setVoltDiv(parseFloat(e.target.value))}
                          />
                        </div>
                      </div>

                      <div className="control-section">
                        <div className="control-section-title">Trace</div>
                        <div className="control-row">
                          <span className="control-label">Color</span>
                          <div className="color-picker">
                            {TRACE_COLORS.map(c => (
                              <div 
                                key={c.id}
                                className={`color-swatch ${traceColor === c.id ? 'active' : ''}`}
                                style={{ background: c.color, color: c.color }}
                                onClick={() => setTraceColor(c.id)}
                              />
                            ))}
                          </div>
                        </div>
                        <div className="control-row">
                          <span className="control-label">Grid</span>
                          <input 
                            type="checkbox" 
                            checked={gridOn}
                            onChange={(e) => setGridOn(e.target.checked)}
                            style={{ width: 18, height: 18, accentColor: 'var(--accent)' }}
                          />
                        </div>
                        <div className="control-row">
                          <span className="control-label">Glow</span>
                          <input 
                            type="checkbox" 
                            checked={glowOn}
                            onChange={(e) => setGlowOn(e.target.checked)}
                            style={{ width: 18, height: 18, accentColor: 'var(--accent)' }}
                          />
                        </div>
                      </div>
                    </>
                  )}

                  {activePanel === 'trigger' && (
                    <>
                      <div className="control-section">
                        <div className="control-section-title">Trigger Mode</div>
                        <div className="btn-group">
                          <button className="btn btn-primary">Rising</button>
                          <button className="btn btn-secondary">Falling</button>
                        </div>
                        <div className="slider-container">
                          <div className="slider-header">
                            <span className="slider-label">Level</span>
                            <span className="slider-value">{triggerLevel.toFixed(2)} V</span>
                          </div>
                          <input 
                            type="range" 
                            min="-2" 
                            max="2" 
                            step="0.01"
                            value={triggerLevel}
                            onChange={(e) => setTriggerLevel(parseFloat(e.target.value))}
                          />
                        </div>
                      </div>
                    </>
                  )}

                  {activePanel === 'measure' && (
                    <>
                      <div className="control-section">
                        <div className="control-section-title">Measurements</div>
                        <div className="measurements-grid">
                          <div className="measurement-card">
                            <div className="measurement-value">{measurements.vpp}</div>
                            <div className="measurement-label">Vpp (V)</div>
                          </div>
                          <div className="measurement-card">
                            <div className="measurement-value">{measurements.rms}</div>
                            <div className="measurement-label">RMS (V)</div>
                          </div>
                          <div className="measurement-card">
                            <div className="measurement-value">{measurements.freq}</div>
                            <div className="measurement-label">Freq (kHz)</div>
                          </div>
                          <div className="measurement-card">
                            <div className="measurement-value">{measurements.dc}</div>
                            <div className="measurement-label">DC (V)</div>
                          </div>
                        </div>
                      </div>
                    </>
                  )}
                </div>
              </div>
            </div>

            {/* Bottom bar */}
            <div className="bottom-bar">
              <div className="bottom-info">
                <div className="info-item">
                  <span>Sample Rate:</span>
                  <span>48.0 kHz</span>
                </div>
                <div className="info-item">
                  <span>Buffer:</span>
                  <span>1024</span>
                </div>
                <div className="info-item">
                  <span>Time:</span>
                  <span>{(timeDiv * 10).toFixed(1)} ms</span>
                </div>
              </div>
              <div className="view-toggle">
                <button 
                  className={`view-toggle-btn ${viewMode === 'time' ? 'active' : ''}`}
                  onClick={() => setViewMode('time')}
                >
                  Time
                </button>
                <button 
                  className={`view-toggle-btn ${viewMode === 'spectrum' ? 'active' : ''}`}
                  onClick={() => setViewMode('spectrum')}
                >
                  Spectrum
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<OscilloscopePreview />);
  </script>
</body>
</html>
